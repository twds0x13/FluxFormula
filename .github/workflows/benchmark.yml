name: Benchmark

on:
  push:
    branches: [main]
    paths:
      - "packages/fluxformula.core/Runtime/**"
      - "benchmarks/**"
      - ".github/workflows/benchmark.yml"
  pull_request:
    branches: [main]
    paths:
      - "packages/fluxformula.core/Runtime/**"
      - "benchmarks/**"
      - ".github/workflows/benchmark.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip benchmark]') }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore benchmarks/benchmarks.csproj

      - name: Run benchmarks
        run: >
          dotnet run
          --project benchmarks/benchmarks.csproj
          -c Release
          --filter '*'
          --exporters "JSON GitHub"
          --artifacts BenchmarkDotNet.Artifacts/results

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: BenchmarkDotNet.Artifacts/results/

  update-docs:
    needs: benchmark
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Download benchmark results
        id: download
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: benchmark-results
          path: BenchmarkDotNet.Artifacts/results/

      - name: Update docs with benchmark data
        if: steps.download.outcome == 'success'
        run: node scripts/update-benchmark-docs.js

      - name: Commit and push updated docs
        if: steps.download.outcome == 'success'
        run: |
          if git diff --quiet docs/index.md docs/en/index.md; then
            echo "No benchmark data changes, skipping commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.md docs/en/index.md
          git commit -m "docs: sync benchmark data [skip benchmark]"
          git push
