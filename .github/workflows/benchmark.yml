name: Benchmark

on:
  push:
    branches: [main]
    paths:
      - "packages/fluxformula.core/Runtime/**"
      - "benchmarks/**"
      - ".github/workflows/benchmark.yml"
  pull_request:
    branches: [main]
    paths:
      - "packages/fluxformula.core/Runtime/**"
      - "benchmarks/**"
      - ".github/workflows/benchmark.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip benchmark]') }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore benchmarks/benchmarks.csproj

      - name: Run benchmarks
        run: >
          dotnet run
          --project benchmarks/benchmarks.csproj
          -c Release
          --filter '*'
          --exporters GitHub

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: BenchmarkDotNet.Artifacts/results/
