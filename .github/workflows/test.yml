name: Test Unity Package

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - ".gitignore"
      - ".npmignore"
      - "package.json"
      - "package-lock.json"
      - "examples/**"
      - "**.drawio"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - ".gitignore"
      - ".npmignore"
      - "package.json"
      - "package-lock.json"
      - "examples/**"
      - "**.drawio"

jobs:
  testRunner:
    name: Unity ${{ matrix.unityVersion }}
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip test]') && !contains(github.event.pull_request.title, '[skip test]') }}

    permissions:
      contents: read
      issues: write
      pull-requests: write
      checks: write
    strategy:
      fail-fast: false
      matrix:
        unityVersion:
          - 2021.3.44f1
          - 2022.3.62f3
          - 6000.0.38f1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Compute package hash for cache invalidation
        run: |
          find packages/fluxformula.core packages/fluxformula packages/fluxformula.burst packages/fluxformula.addressables packages/fluxformula.addressables.unitask -type f \
            \( -name '*.cs' -o -name '*.asmdef' -o -name '*.meta' \) \
            -exec sha256sum {} \; | sort | sha256sum | cut -c1-16 \
            > .ci/Assets/package-cache-key.txt

      - name: Run Tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: .ci
          unityVersion: ${{ matrix.unityVersion }}
          testMode: all
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Test-results
          path: artifacts

  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: testRunner
    if: ${{ github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip release]') }}
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install Semantic Release
        run: npm install

      - name: Run Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
