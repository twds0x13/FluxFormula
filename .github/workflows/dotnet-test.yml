name: .NET Test & Coverage

on:
  push:
    branches: [main, dev]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - ".gitignore"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - ".gitignore"

jobs:
  test:
    name: .NET ${{ matrix.dotnet-version }} — Core Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dotnet-version: ["9.0.x"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Install coverage tool
        run: dotnet tool install -g dotnet-coverage

      - name: Run tests with coverage
        run: |
          dotnet-coverage collect \
            --output coverage-latest.xml \
            --output-format cobertura \
            dotnet test tests/FluxFormula.Core.Tests/FluxFormula.Tests.csproj \
              --configuration Release \
              --no-build:false

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage-latest.xml
          flags: core-tests
          name: dotnet-core
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Report coverage summary
        run: |
          echo "Coverage report generated. View at https://app.codecov.io/gh/twds0x13/FluxFormula"
