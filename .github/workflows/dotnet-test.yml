name: .NET Test & Coverage

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - ".gitignore"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - ".gitignore"

jobs:
  test:
    name: .NET ${{ matrix.dotnet-version }} — Core Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dotnet-version: ["9.0.x"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Run tests (no coverage)
        run: dotnet test tests/FluxFormula.Core.Tests/FluxFormula.Tests.csproj --configuration Release

      - name: Install coverage tool
        run: dotnet tool install -g dotnet-coverage

      - name: Collect coverage
        run: >
          dotnet-coverage collect
          --output coverage-latest.xml
          --output-format cobertura
          --exclude-by-file "**/FluxILCompiler.cs"
          "dotnet test tests/FluxFormula.Core.Tests/FluxFormula.Tests.csproj --configuration Release --no-build"
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage-latest.xml
          flags: core-tests
          name: dotnet-core
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
