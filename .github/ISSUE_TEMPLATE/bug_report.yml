name: 🐞 Bug Report
description: File a bug report.
type: Bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. A **minimal reproduction** — a small, self-contained C# snippet — is the most helpful thing you can provide.

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal Reproduction
      description: |
        A short C# code sample that triggers the bug. Include the operator enum, definition struct, and the tokens or expression that cause the issue.
      placeholder: |
        ```csharp
        public enum FloatOp : byte { Const, Add, Return }
        // definition + assembler + tokens that trigger the bug
        ```
      render: csharp
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include the full error message or stack trace if applicable.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Environment
      description: "FluxFormula version, Unity version, and scripting backend (Mono or IL2CPP). Example: `FluxFormula 1.3.2, Unity 2022.3 LTS, Mono`"
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: JIT or interpreter? Lexer or direct tokens? Anything else that might help.
    validations:
      required: false
