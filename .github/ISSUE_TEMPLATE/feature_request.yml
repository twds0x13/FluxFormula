name: 💡 Feature Request
description: Suggest an enhancement.
type: Feature
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Describing the **problem and use case** clearly helps more than a detailed API design.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: |
        What problem are you facing? What use case is currently blocked or awkward to implement?
      placeholder: |
        I need to [goal] but currently have to [workaround], which is [problem].
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Suggested Approach
      description: How might this be solved? A rough sketch is fine — no need for a complete design.
      placeholder: |
        An API shape or workflow that would address this...
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds or alternative approaches you've already tried.
    validations:
      required: false
